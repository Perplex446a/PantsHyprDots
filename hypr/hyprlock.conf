general {
  hide_cursor = true
  ignore_empty_input = true
  blur_passes = 4
  blur_size = 8
}

background {
  monitor = 
  path = ~/Wallpapers/hehehehe2.png
}

label {
  monitor = 
  text = $TIME
  font_size = 70
  position = -730, 300
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgb(f007f0)
    check_color=rgb(8f07f0)
    fail_color=rgb(e82a2a)

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = -720, -50
    halign = center
    valign = center

    placeholder_text = <i>password</i>
}
